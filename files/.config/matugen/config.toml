# Add your standard colors here to make them harmonic
[config.custom_colors]
red = { color = "#ff2b2b", blend = true }
green = { color = "#00ff40", blend = true }
yellow = { color = "#f0ff4e", blend = true }
blue = { color = "#455bff", blend = true }
cyan = { color = "#8be9fd", blend = true }
magenta = { color = "#ff4eb2", blend = true }
orange = { color = "#ff9019", blend = true }


[config.wallpaper]
command = "awww"
arguments = ["img", "--transition-type", "center"]
set = true


[templates.waybar]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/waybar/colors.css'
post_hook = 'pkill -SIGUSR2 waybar'

[templates.wlogout]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/wlogout/colors.css'

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland-colors.conf'
output_path = '~/.config/hypr/colors.conf'

[templates.kitty]
input_path = '~/.config/matugen/templates/kitty-colors.conf'
output_path = '~/.config/kitty/themes/Matugen.conf'
post_hook = "kitty +kitten themes --reload-in=all Matugen"