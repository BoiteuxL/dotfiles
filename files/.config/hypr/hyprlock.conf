# CATPPUCCIN MOCHA COLORS
$base      = rgba(1e1e2eec)
$text      = rgb(cdd6f4)
$mauve     = rgb(cba6f7)
$lavender  = rgb(b4befe)
$red       = rgb(f38ba8)
$surface0  = rgb(313244)
$crust     = rgb(11111b)

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /home/$USER/Pictures/wallpapers/current_wallpaper.png   # Change this to your wallpaper path
    color = $base
    blur_passes = 2 # 0 disables blurring
}

# TIME (Clock style)
label {
    monitor =
    text = $TIME
    color = $pink
    font_size = 90
    font_family = AtkynsonMono NFP Bold
    position = 0, 80
    halign = center
    valign = center
}

# USER GREETING
label {
    monitor =
    text = Hi there, $USER
    color = $text
    font_size = 20
    font_family = AtkynsonMono NFP
    position = 0, 0
    halign = center
    valign = center
}

# INPUT FIELD (The "Pill" design)
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = $lavender
    inner_color = $base
    font_color = $text
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 8 # Matching your Waybar border-radius
    check_color = $mauve
    fail_color = $red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -80
    halign = center
    valign = center
}